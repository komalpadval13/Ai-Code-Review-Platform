version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: codereview-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: code_review_db
      MYSQL_USER: ${DB_USERNAME:-codereview}
      MYSQL_PASSWORD: ${DB_PASSWORD:-codereview123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - codereview-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codereview-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/code_review_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-codereview}
      DB_PASSWORD: ${DB_PASSWORD:-codereview123}
      JWT_SECRET: ${JWT_SECRET:-a3f5b8c7d9e1f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0a2b4c6d8e0f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      CORS_ORIGINS: http://localhost,http://localhost:3000
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - codereview-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codereview-frontend
    restart: unless-stopped
    networks:
      - codereview-network

  nginx:
    image: nginx:alpine
    container_name: codereview-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - codereview-network

volumes:
  mysql_data:
  uploads_data:

networks:
  codereview-network:
    driver: bridge
