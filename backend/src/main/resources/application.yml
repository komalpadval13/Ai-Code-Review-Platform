spring:
  application:
    name: ai-code-review-platform

  datasource:
    url: jdbc:h2:mem:code_review_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:a3f5b8c7d9e1f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0a2b4c6d8e0f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  upload:
    directory: ${UPLOAD_DIR:./uploads}
    allowed-extensions: .java,.py,.js,.ts,.cpp,.c,.h,.hpp,.css,.html,.xml,.json,.yaml,.yml,.md,.txt,.go,.rs,.rb,.php,.swift,.kt
    max-file-size: 10485760

  ai:
    provider: ${AI_PROVIDER:openai}
    api-key: ${AI_API_KEY:}
    api-url: ${AI_API_URL:https://api.openai.com/v1/chat/completions}
    model: ${AI_MODEL:gpt-4o}
    max-tokens: ${AI_MAX_TOKENS:4096}
    temperature: ${AI_TEMPERATURE:0.3}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.codereview: DEBUG
    org.springframework.security: WARN
